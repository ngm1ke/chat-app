name: Run unit tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: school_management_test
        ports:
          - 5433:5432 # Map container port 5432 to host port 5433 to match your tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      # Migrations are currently handled by TypeORM synchronize: true in your test config.
      # If you prefer to run migrations manually in CI, you can uncomment this:
      # - name: Run migrations
      #   working-directory: ./backend
      #   run: npm run migration:run

      - name: Run tests
        working-directory: ./backend
        run: npm run test
        env:
          # If your app needs the DATABASE_URL even during tests
          DATABASE_URL: postgres://postgres:password@localhost:5433/school_management_test
          TEST_DB_HOST: localhost
